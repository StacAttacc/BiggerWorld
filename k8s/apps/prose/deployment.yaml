apiVersion: apps/v1
kind: Deployment
metadata:
  name: prose
  namespace: prose
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prose
  template:
    metadata:
      labels:
        app: prose
    spec:
      containers:
        - name: prose
          image: ghcr.io/stacattacc/prose:20260622223337-99f040c0eb829ddcadfb9b1c6466387d0e1322ab # {"$imagepolicy": "flux-system:prose"}
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75 -XX:InitialRAMPercentage=50"
          envFrom:
            - secretRef:
                name: prose-secrets
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
        - name: tailscale
          image: tailscale/tailscale:v1.98.4
          env:
            - name: TS_USERSPACE
              value: "true"
            - name: TS_KUBE_SECRET
              value: ""
            - name: TS_HOSTNAME
              value: prose-api
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: prose-secrets
                  key: TS_AUTHKEY
            - name: TS_EXTRA_ARGS
              value: "--advertise-tags=tag:k8s"
            - name: TS_STATE_DIR
              value: /tmp/ts-state
            - name: TS_SERVE_CONFIG
              value: /etc/ts/serve-config.json
          volumeMounts:
            - name: ts-serve-config
              mountPath: /etc/ts
              readOnly: true
            - name: ts-state
              mountPath: /tmp/ts-state
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: ts-serve-config
          configMap:
            name: ts-serve-config
        - name: ts-state
          emptyDir: {}
