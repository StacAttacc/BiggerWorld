apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sewing-assistant-secrets
  namespace: sewing-assistant
spec:
  refreshInterval: 1m
  target:
    name: sewing-assistant-secrets
  data:
    - secretKey: ANTHROPIC_API_KEY
      sourceRef:
        storeRef:
          name: vault
          kind: ClusterSecretStore
      remoteRef:
        key: secret/sewing-assistant
        property: ANTHROPIC_API_KEY
