apiVersion: v1
kind: Service
metadata:
  name: nginx-jellyfin
  namespace: ingress-nginx
  annotations:
    tailscale.com/hostname: "jellyfin"
spec:
  selector:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/component: controller
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
  loadBalancerClass: tailscale
---
