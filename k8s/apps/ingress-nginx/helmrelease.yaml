apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 10m
  chart:
    spec:
      chart: ingress-nginx
      version: ">=4.0.0"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  values:
    controller:
      allowSnippetAnnotations: true
      admissionWebhooks:
        enabled: false
      extraArgs:
        enable-annotation-validation: "false"
      service:
        type: LoadBalancer
        loadBalancerClass: tailscale
        annotations:
          tailscale.com/expose: "true"
          tailscale.com/hostname: "ingress"
