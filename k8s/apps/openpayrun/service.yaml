apiVersion: v1
kind: Service
metadata:
  name: openpayrun
  namespace: openpayrun
spec:
  selector:
    app: openpayrun
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openpayrun
  namespace: openpayrun
  annotations:
    tailscale.com/funnel: "true"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: openpayrun
      port:
        number: 8080
  tls:
    - hosts:
        - openpayrun-api
