apiVersion: v1
kind: Service
metadata:
  name: openpayrun
  namespace: openpayrun
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/funnel: "true"
    tailscale.com/hostname: openpayrun-api
spec:
  selector:
    app: openpayrun
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
