apiVersion: v1
kind: ServiceAccount
metadata:
  name: openpayrun-tailscale
  namespace: openpayrun
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale-state
  namespace: openpayrun
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["tailscale-state"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale-state
  namespace: openpayrun
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tailscale-state
subjects:
  - kind: ServiceAccount
    name: openpayrun-tailscale
    namespace: openpayrun
