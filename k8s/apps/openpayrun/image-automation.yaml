apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: openpayrun
  namespace: flux-system
spec:
  image: ghcr.io/stacattacc/openpayrun
  interval: 1m
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: openpayrun
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: openpayrun
  filterTags:
    pattern: '^\d{14}-[a-f0-9]+'
  policy:
    alphabetical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: openpayrun
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: fluxcdbot
      messageTemplate: 'chore: update openpayrun image to {{range .Updated.Images}}{{.}}{{end}}'
    push:
      branch: main
  update:
    path: ./k8s/apps/openpayrun
    strategy: Setters
