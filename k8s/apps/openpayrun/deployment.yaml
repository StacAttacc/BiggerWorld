apiVersion: apps/v1
kind: Deployment
metadata:
  name: openpayrun
  namespace: openpayrun
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openpayrun
  template:
    metadata:
      labels:
        app: openpayrun
    spec:
      containers:
        - name: openpayrun
          image: ghcr.io/stacattacc/openpayrun:20260718111600-85a640f477b2a957f086fa6e84eb1c4bfc079c94 # {"$imagepolicy": "flux-system:openpayrun"}
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: AllowedOrigins__0
              value: https://open-payrun.vercel.app
          envFrom:
            - secretRef:
                name: openpayrun-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
