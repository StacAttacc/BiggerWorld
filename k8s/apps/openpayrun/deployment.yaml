apiVersion: apps/v1
kind: Deployment
metadata:
  name: openpayrun
  namespace: openpayrun
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openpayrun
  template:
    metadata:
      labels:
        app: openpayrun
    spec:
      serviceAccountName: openpayrun-tailscale
      containers:
        - name: openpayrun
          image: ghcr.io/stacattacc/openpayrun:20260718111600-85a640f477b2a957f086fa6e84eb1c4bfc079c94 # {"$imagepolicy": "flux-system:openpayrun"}
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: AllowedOrigins__0
              value: https://open-payrun.vercel.app
          envFrom:
            - secretRef:
                name: openpayrun-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:v1.98.4
          env:
            - name: TS_USERSPACE
              value: "true"
            - name: TS_HOSTNAME
              value: openpayrun-api
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: openpayrun-secrets
                  key: TS_AUTHKEY
            - name: TS_EXTRA_ARGS
              value: "--advertise-tags=tag:k8s"
            - name: TS_SERVE_CONFIG
              value: /etc/ts/serve-config.json
            - name: TS_KUBE_SECRET
              value: tailscale-state
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: ts-serve-config
              mountPath: /etc/ts
              readOnly: true
      volumes:
        - name: ts-serve-config
          configMap:
            name: ts-serve-config
