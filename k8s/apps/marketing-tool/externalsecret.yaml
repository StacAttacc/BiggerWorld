apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: marketing-tool-secrets
  namespace: marketing-tool
spec:
  refreshInterval: 1m
  target:
    name: marketing-tool-secrets
  data:
    - secretKey: BETTER_AUTH_SECRET
      sourceRef:
        storeRef:
          name: vault
          kind: ClusterSecretStore
      remoteRef:
        key: secret/marketing-tool
        property: BETTER_AUTH_SECRET
    - secretKey: DATABASE_URL
      sourceRef:
        storeRef:
          name: vault
          kind: ClusterSecretStore
      remoteRef:
        key: secret/marketing-tool
        property: DATABASE_URL
    - secretKey: ANTHROPIC_API_KEY
      sourceRef:
        storeRef:
          name: vault
          kind: ClusterSecretStore
      remoteRef:
        key: secret/marketing-tool
        property: ANTHROPIC_API_KEY
