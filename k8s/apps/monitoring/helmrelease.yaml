apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=60.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    grafana:
      enabled: true
      admin:
        existingSecret: grafana-admin-secret
        userKey: admin-user
        passwordKey: admin-password
      envFrom:
        - secretRef:
            name: grafana-oauth-secret
      grafana.ini:
        server:
          root_url: "https://grafana.tail789d60.ts.net"
        auth.generic_oauth:
          enabled: true
          name: Authentik
          allow_sign_up: true
          client_id: "${client_id}"
          client_secret: "${client_secret}"
          scopes: "openid profile email"
          auth_url: "https://authentik.tail789d60.ts.net/application/o/authorize/"
          token_url: "https://authentik.tail789d60.ts.net/application/o/token/"
          api_url: "https://authentik.tail789d60.ts.net/application/o/userinfo/"
          role_attribute_path: "contains(groups, 'authentik Admins') && 'Admin' || 'Viewer'"
    prometheus:
      prometheusSpec:
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi
    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 5Gi
