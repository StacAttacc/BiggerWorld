apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 10m
  timeout: 15m
  install:
    timeout: 15m
  upgrade:
    timeout: 15m
  chart:
    spec:
      chart: authentik
      version: ">=2024.0.0"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  values:
    authentik:
      secret_key:
        valueFrom:
          secretKeyRef:
            name: authentik-secrets
            key: secret-key
      postgresql:
        password:
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: postgresql-password
    postgresql:
      enabled: true
      auth:
        existingSecret: authentik-secrets
        secretKeys:
          adminPasswordKey: postgresql-postgres-password
          userPasswordKey: postgresql-password
      primary:
        nodeSelector:
          kubernetes.io/hostname: asta
        persistence:
          enabled: true
          storageClass: local-path
          size: 8Gi
  redis:
    enabled: true
    master:
      persistence:
        enabled: false    redis:
      enabled: true
      master:
        persistence:
          enabled: false
