apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      nodeSelector:
        kubernetes.io/hostname: asta
      initContainers:
        - name: install-sso-plugin
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              set -e
              PLUGIN_DIR=/config/plugins
              if ls "$PLUGIN_DIR"/SSO-Auth_* 2>/dev/null | grep -q .; then
                echo "SSO-Auth already installed, skipping"
                exit 0
              fi
              apk add --no-cache curl jq unzip ca-certificates
              MANIFEST=$(curl -fsSL https://raw.githubusercontent.com/9p4/jellyfin-plugin-sso/manifest-release/manifest.json)
              INFO=$(echo "$MANIFEST" | jq -r '.[0].versions[] | select(.targetAbi | startswith("10.11")) | [.sourceUrl,.version] | @tsv' | head -1)
              if [ -z "$INFO" ]; then
                INFO=$(echo "$MANIFEST" | jq -r '[.[0].versions[0].sourceUrl, .[0].versions[0].version] | @tsv')
              fi
              SOURCE_URL=$(echo "$INFO" | cut -f1)
              PLUGIN_VERSION=$(echo "$INFO" | cut -f2)
              echo "Downloading SSO-Auth $PLUGIN_VERSION from $SOURCE_URL"
              curl -fsSL -o /tmp/sso.zip "$SOURCE_URL"
              mkdir -p "$PLUGIN_DIR/SSO-Auth_$${PLUGIN_VERSION}"
              unzip -o /tmp/sso.zip -d "$PLUGIN_DIR/SSO-Auth_$${PLUGIN_VERSION}"
              echo "SSO-Auth installed"
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          ports:
            - containerPort: 8096
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "4"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: media
          hostPath:
            path: ${MEDIA_HOST_PATH}
            type: Directory
