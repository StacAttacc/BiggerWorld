apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pihole-api-secret
  namespace: pihole
spec:
  refreshInterval: 1m
  target:
    name: pihole-api-secret
  data:
    - secretKey: password
      sourceRef:
        storeRef:
          name: vault
          kind: ClusterSecretStore
      remoteRef:
        key: secret/pihole
        property: api-password
