apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 10m
  timeout: 10m
  install:
    timeout: 10m
  upgrade:
    timeout: 10m
  chart:
    spec:
      chart: vault
      version: ">=0.28.0"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
  values:
    server:
      dataStorage:
        enabled: true
        size: 10Gi
        storageClass: local-path
      nodeSelector:
        kubernetes.io/hostname: asta
      ha:
        enabled: false
    ui:
      enabled: true
    injector:
      enabled: false
