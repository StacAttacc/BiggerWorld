apiVersion: v1
kind: ConfigMap
metadata:
  name: pihole-bouncer-script
  namespace: crowdsec
data:
  bouncer.py: |
    #!/usr/bin/env python3
    import os
    import json
    import time
    import urllib.request
    import urllib.error

    LAPI_URL = os.environ["LAPI_URL"].rstrip("/")
    BOUNCER_API_KEY = os.environ["BOUNCER_API_KEY"]
    PIHOLE_URL = os.environ["PIHOLE_URL"].rstrip("/")
    PIHOLE_PASSWORD = os.environ["PIHOLE_PASSWORD"]

    sid = None

    def auth():
        global sid
        payload = json.dumps({"password": PIHOLE_PASSWORD}).encode()
        req = urllib.request.Request(
            f"{PIHOLE_URL}/api/auth",
            data=payload,
            headers={"Content-Type": "application/json"},
            method="POST",
        )
        with urllib.request.urlopen(req) as resp:
            data = json.loads(resp.read())
            sid = data["session"]["sid"]

    def pihole_req(method, path, body=None):
        payload = json.dumps(body).encode() if body else None
        req = urllib.request.Request(
            f"{PIHOLE_URL}{path}",
            data=payload,
            headers={"Content-Type": "application/json", "Cookie": f"sid={sid}"},
            method=method,
        )
        return urllib.request.urlopen(req)

    def add(ip):
        try:
            pihole_req("POST", "/api/domains/deny/exact", {"domain": ip, "comment": "crowdsec"})
            print(f"blocked {ip}", flush=True)
        except urllib.error.HTTPError as e:
            if e.code != 409:
                raise

    def remove(ip):
        try:
            pihole_req("DELETE", f"/api/domains/deny/exact/{ip}")
            print(f"unblocked {ip}", flush=True)
        except urllib.error.HTTPError as e:
            if e.code != 404:
                raise

    def get_decisions(startup=False):
        url = f"{LAPI_URL}/v1/decisions/stream"
        if startup:
            url += "?startup=true"
        req = urllib.request.Request(url, headers={"X-Api-Key": BOUNCER_API_KEY})
        with urllib.request.urlopen(req) as resp:
            return json.loads(resp.read())

    def sync(startup=False):
        data = get_decisions(startup=startup)
        for d in data.get("new") or []:
            add(d["value"])
        for d in data.get("deleted") or []:
            remove(d["value"])

    auth()
    sync(startup=True)
    while True:
        time.sleep(30)
        try:
            sync()
        except urllib.error.HTTPError as e:
            if e.code in (401, 403):
                print("session expired, re-authenticating", flush=True)
                auth()
            else:
                print(f"error: {e}", flush=True)
        except Exception as e:
            print(f"error: {e}", flush=True)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole-bouncer
  namespace: crowdsec
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pihole-bouncer
  template:
    metadata:
      labels:
        app: pihole-bouncer
    spec:
      containers:
        - name: bouncer
          image: python:3.12-slim
          command: ["python", "/scripts/bouncer.py"]
          env:
            - name: LAPI_URL
              value: "http://crowdsec-service.crowdsec.svc.cluster.local:8080"
            - name: BOUNCER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: crowdsec-secret
                  key: bouncer-api-key
            - name: PIHOLE_URL
              value: "http://pihole.pihole.svc.cluster.local"
            - name: PIHOLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crowdsec-secret
                  key: pihole-api-password
          volumeMounts:
            - name: script
              mountPath: /scripts
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: script
          configMap:
            name: pihole-bouncer-script
            defaultMode: 0755
