apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec
  namespace: crowdsec
spec:
  interval: 10m
  chart:
    spec:
      chart: crowdsec
      version: "0.24.0"
      sourceRef:
        kind: HelmRepository
        name: crowdsec
        namespace: flux-system
  values:
    container_runtime: containerd

    lapi:
      persistentVolume:
        data:
          enabled: true
          existingClaim: crowdsec-db
      service:
        type: NodePort
        nodePort: 30008
      env:
        - name: ENROLL_KEY
          valueFrom:
            secretKeyRef:
              name: crowdsec-secret
              key: enrollment-key
              optional: true

    agent:
      acquisition:
        - namespace: ingress-nginx
          podName: ingress-nginx-controller-*
          program: nginx
      env:
        - name: COLLECTIONS
          value: "crowdsecurity/nginx"
