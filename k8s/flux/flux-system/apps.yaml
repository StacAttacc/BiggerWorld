apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/apps
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-config
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: apps
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/apps-config
  prune: true
  wait: true
  force: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  commonMetadata:
    annotations:
      kustomize.toolkit.fluxcd.io/force: "true"
