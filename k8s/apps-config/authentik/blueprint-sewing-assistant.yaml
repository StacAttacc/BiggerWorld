apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-sewing-assistant
  namespace: authentik
data:
  sewing-assistant.yaml: |
    version: 1
    metadata:
      name: Sewing Assistant
    entries:
      - model: authentik_providers_proxy.proxyprovider
        id: sewing-assistant-provider
        state: present
        identifiers:
          name: Sewing Assistant Provider
        attrs:
          name: Sewing Assistant Provider
          mode: forward_single
          external_host: http://sewing.${TAILNET_DOMAIN}
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: sewing-assistant
        attrs:
          name: Sewing Assistant
          slug: sewing-assistant
          provider: !KeyOf sewing-assistant-provider
