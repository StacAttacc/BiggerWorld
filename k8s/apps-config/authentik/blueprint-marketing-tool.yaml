apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-marketing-tool
  namespace: authentik
data:
  marketing-tool.yaml: |
    version: 1
    metadata:
      name: Marketing Tool
    entries:
      - model: authentik_providers_proxy.proxyprovider
        id: marketing-tool-provider
        state: present
        identifiers:
          name: Marketing Tool Provider
        attrs:
          name: Marketing Tool Provider
          mode: forward_single
          external_host: http://marketing.tail789d60.ts.net
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: marketing-tool
        attrs:
          name: Marketing Tool
          slug: marketing-tool
          provider: !KeyOf marketing-tool-provider
