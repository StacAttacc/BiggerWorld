apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-media
  namespace: authentik
data:
  media.yaml: |
    version: 1
    metadata:
      name: Media Applications (Jellyfin + Navidrome)
    entries:
      - model: authentik_providers_proxy.proxyprovider
        id: jellyfin-provider
        state: present
        identifiers:
          name: Jellyfin Provider
        attrs:
          name: Jellyfin Provider
          mode: forward_domain
          external_host: http://jellyfin.tail789d60.ts.net
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: jellyfin
        attrs:
          name: Jellyfin
          slug: jellyfin
          provider: !KeyOf jellyfin-provider

      - model: authentik_providers_proxy.proxyprovider
        id: navidrome-provider
        state: present
        identifiers:
          name: Navidrome Provider
        attrs:
          name: Navidrome Provider
          mode: forward_domain
          external_host: http://navidrome.tail789d60.ts.net
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: navidrome
        attrs:
          name: Navidrome
          slug: navidrome
          provider: !KeyOf navidrome-provider

