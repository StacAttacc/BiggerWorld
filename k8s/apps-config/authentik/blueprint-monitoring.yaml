apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-monitoring
  namespace: authentik
data:
  monitoring.yaml: |
    version: 1
    metadata:
      name: Monitoring Applications (Uptime Kuma)
    entries:
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: Uptime Kuma Provider
        attrs:
          name: Uptime Kuma Provider
          mode: forward_single
          external_host: http://uptime.tail789d60.ts.net
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: uptime-kuma
        attrs:
          name: Uptime Kuma
          slug: uptime-kuma
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, Uptime Kuma Provider]]
