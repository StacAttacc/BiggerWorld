apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 10m
  timeout: 15m
  install:
    timeout: 15m
  upgrade:
    timeout: 15m
  chart:
    spec:
      chart: authentik
      version: ">=2024.0.0"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  values:
    authentik:
      secret_key: "${AUTHENTIK_SECRET_KEY}"
      postgresql:
        password: "${AUTHENTIK_POSTGRESQL_PASSWORD}"
    global:
      envFrom:
        - secretRef:
            name: authentik-secrets
        - secretRef:
            name: authentik-blueprint-grafana-env
        - secretRef:
            name: authentik-blueprint-jellyfin-env
    blueprints:
      configMaps:
        - authentik-blueprint-grafana
        - authentik-blueprint-media
        - authentik-blueprint-monitoring
        - authentik-blueprint-outpost
        - authentik-blueprint-jellyfin-oidc
        - authentik-blueprint-sewing-assistant
    postgresql:
      enabled: true
      auth:
        existingSecret: authentik-secrets
        secretKeys:
          adminPasswordKey: postgresql-postgres-password
          userPasswordKey: postgresql-password
      primary:
        nodeSelector:
          kubernetes.io/hostname: asta
        persistence:
          enabled: true
          storageClass: local-path
          size: 8Gi
    redis:
      enabled: true
      master:
        persistence:
          enabled: false
