apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-blueprint-jellyfin-env
  namespace: authentik
spec:
  refreshInterval: 1m
  target:
    name: authentik-blueprint-jellyfin-env
  data:
    - secretKey: JELLYFIN_OIDC_CLIENT_ID
      sourceRef:
        storeRef:
          name: vault
          kind: ClusterSecretStore
      remoteRef:
        key: secret/jellyfin
        property: oidc-client-id
    - secretKey: JELLYFIN_OIDC_CLIENT_SECRET
      sourceRef:
        storeRef:
          name: vault
          kind: ClusterSecretStore
      remoteRef:
        key: secret/jellyfin
        property: oidc-client-secret
