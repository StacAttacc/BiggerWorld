apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: 1m
  target:
    name: authentik-secrets
  data:
    - secretKey: AUTHENTIK_SECRET_KEY
      sourceRef:
        storeRef:
          name: vault
          kind: ClusterSecretStore
      remoteRef:
        key: secret/authentik
        property: secret-key
    - secretKey: AUTHENTIK_POSTGRESQL__PASSWORD
      sourceRef:
        storeRef:
          name: vault
          kind: ClusterSecretStore
      remoteRef:
        key: secret/authentik
        property: postgresql-password
    - secretKey: AUTHENTIK_POSTGRESQL__POSTGRES__PASSWORD
      sourceRef:
        storeRef:
          name: vault
          kind: ClusterSecretStore
      remoteRef:
        key: secret/authentik
        property: postgresql-postgres-password
    - secretKey: postgresql-password
      sourceRef:
        storeRef:
          name: vault
          kind: ClusterSecretStore
      remoteRef:
        key: secret/authentik
        property: postgresql-password
    - secretKey: postgresql-postgres-password
      sourceRef:
        storeRef:
          name: vault
          kind: ClusterSecretStore
      remoteRef:
        key: secret/authentik
        property: postgresql-postgres-password
