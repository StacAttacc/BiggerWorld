apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-pihole
  namespace: authentik
data:
  pihole.yaml: |
    version: 1
    metadata:
      name: Pi-hole
    entries:
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: Pi-hole Provider
        attrs:
          name: Pi-hole Provider
          mode: forward_single
          external_host: http://pihole.${TAILNET_DOMAIN}
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: pihole
        attrs:
          name: Pi-hole
          slug: pihole
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, Pi-hole Provider]]
