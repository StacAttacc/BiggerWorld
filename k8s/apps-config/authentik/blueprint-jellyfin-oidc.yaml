apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-jellyfin-oidc
  namespace: authentik
data:
  jellyfin-oidc.yaml: |
    version: 1
    metadata:
      name: Jellyfin OIDC Application
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        id: jellyfin-oidc-provider
        state: present
        identifiers:
          name: jellyfin-oidc
        attrs:
          name: jellyfin-oidc
          client_id: !Env JELLYFIN_OIDC_CLIENT_ID
          client_secret: !Env JELLYFIN_OIDC_CLIENT_SECRET
          redirect_uris:
            - matching_mode: strict
              url: http://jellyfin.${TAILNET_DOMAIN}/sso/OID/r/Authentik
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [managed, goauthentik.io/crypto/default-certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          sub_mode: hashed_user_id
          issuer_mode: per_provider

      - model: authentik_core.application
        state: present
        identifiers:
          slug: jellyfin-oidc
        attrs:
          name: Jellyfin OIDC
          slug: jellyfin-oidc
          provider: !KeyOf jellyfin-oidc-provider
